<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="런드리프로" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <style>
    html, body { margin: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif; background: #eff3f8; color: #111827; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center; }
    .box { max-width: 420px; background: #fff; border: 1px solid #dde5ef; border-radius: 20px; padding: 24px; box-shadow: 0 12px 28px rgba(15,23,42,.08); }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { color: #6b7280; line-height: 1.55; }
    a { display: inline-flex; margin-top: 12px; min-height: 48px; align-items: center; justify-content: center; padding: 0 18px; border-radius: 14px; background: #2563eb; color: #fff; font-weight: 800; text-decoration: none; }
  </style>
  <script>
    location.replace('https://washwell-laundry-pro.vercel.app');
  </script>
</head>
<body>
  <main>
    <section class="box">
      <h1>워시웰 런드리프로</h1>
      <p>배포된 앱으로 이동합니다. 이동하지 않으면 아래 버튼을 눌러주세요.</p>
      <a href="https://washwell-laundry-pro.vercel.app">앱 열기</a>
    </section>
  </main>
</body>
</html>
